# Swarm: docker stack deploy -c docker-compose.yml vitoriano-site
services:
  vitoriano-site:
    image: ghcr.io/vitoriano/vitoriano-site:latest
    # Após SIGTERM no rolling update, o engine força SIGKILL passado este tempo (evita task antiga presa).
    stop_grace_period: 20s
    # Labels do *contentor* (tasks). Watchtower filtra por isto; deploy.labels no Swarm ficam só no serviço.
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      NODE_ENV: production
    networks:
      - network_public
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"

        # Domínio do site
        - "traefik.http.routers.vitoriano-site.rule=Host(`vitorianoernandes.dev`)"

        # Externo via Traefik: porta 80 (HTTP) e 443 (HTTPS)
        - "traefik.http.routers.vitoriano-site-http.rule=Host(`vitorianoernandes.dev`)"
        - "traefik.http.routers.vitoriano-site-http.entrypoints=web"
        - "traefik.http.routers.vitoriano-site-http.service=vitoriano-site"

        - "traefik.http.routers.vitoriano-site.entrypoints=websecure"
        - "traefik.http.routers.vitoriano-site.tls=true"
        - "traefik.http.routers.vitoriano-site.tls.certresolver=letsencrypt"
        # Evita security-headers@file: inclui X-Robots-Tag noindex (adequado a UIs admin, não ao site público).
        - "traefik.http.routers.vitoriano-site.middlewares=rate-limit@file,compress-response@file"
        - "traefik.http.services.vitoriano-site.loadbalancer.server.port=3000"
        - "traefik.http.routers.vitoriano-site.service=vitoriano-site"
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
        # Janela pós-subida da task nova: se falhar aqui, o update falha/rollback em vez de ficar preso.
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 128M
          cpus: "0.10"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ > /dev/null || exit 1"]
      # Intervalo mais curto: o Swarm só para a task antiga (start-first) quando a nova fica healthy.
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  network_public:
    external: true
