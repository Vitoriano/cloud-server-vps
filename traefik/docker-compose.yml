services:
  traefik:
    image: traefik:v3.3.7
    hostname: traefik
    environment:
      - DOCKER_API_VERSION=1.45
    command:
      # --- API desabilitada ---
      - --api=false

      # --- Ping (healthcheck) ---
      - --ping=true

      # --- Provider: Docker Swarm ---
      - --providers.swarm=true
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedbydefault=false
      - --providers.swarm.network=network_public
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true

      # --- Entrypoints ---
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      - --entrypoints.websecure.http.tls.certResolver=letsencrypt

      # --- Certificados (Let's Encrypt) ---
      - --certificatesresolvers.letsencrypt.acme.email=vitorianoernandes2012@gmail.com
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.caserver=https://acme-v02.api.letsencrypt.org/directory

      # --- Access Log ---
      - --accesslog=true
      - --accesslog.filepath=/var/log/traefik/access.log
      - --accesslog.format=json
      - --accesslog.bufferingsize=100
      - --accesslog.fields.defaultmode=keep
      - --accesslog.fields.headers.defaultmode=redact

      # --- General Log ---
      - --log.level=DEBUG
      - --log.format=json

    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
      - traefik-logs:/var/log/traefik
    configs:
      - source: traefik-security
        target: /etc/traefik/dynamic/security.yml
    networks:
      - network_public
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - "traefik.enable=false"
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
        reservations:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "traefik"

configs:
  traefik-security:
    file: ./dynamic/security.yml
    name: traefik-security-v2

volumes:
  traefik-certs:
    name: traefik-certs
  traefik-logs:
    name: traefik-logs

networks:
  network_public:
    external: true
